<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení – Advisor CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand-main: #0B3A7A; --brand-dark: #0a0f29; --brand-light: #EAF3FF; --brand-border: #D6E6FF; }
    body { font-family: Inter, sans-serif; margin: 0; min-height: 100vh; background: var(--brand-light); color: #1e293b; display: flex; flex-direction: column; }
    nav { background: white; border-bottom: 1px solid var(--brand-border); padding: 12px 16px; display: flex; justify-content: space-between; }
    nav .logo { font-weight: 700; color: var(--brand-main); text-decoration: none; }
    main { flex: 1; max-width: 28rem; margin: 0 auto; padding: 48px 16px; width: 100%; }
    .card { background: white; border: 1px solid var(--brand-border); border-radius: 12px; padding: 32px; }
    .card h1 { font-size: 1.25rem; font-weight: 700; color: var(--brand-dark); margin: 0 0 24px; }
    label { display: block; font-size: 0.875rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 16px; border: 1px solid var(--brand-border); border-radius: 12px; margin-bottom: 16px; }
    button { width: 100%; padding: 10px 16px; border-radius: 12px; font-weight: 600; background: var(--brand-main); color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Advisor CRM</a>
    <a href="index.html">← Zpět</a>
  </nav>
  <main>
    <div class="card">
      <h1>Přihlášení</h1>
      <form action="dashboard.html">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="vas@email.cz" required>
        <label for="password">Heslo</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="submit">Přihlásit se</button>
      </form>
    </div>
  </main>
</body>
</html>
