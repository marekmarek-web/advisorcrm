name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Minimal placeholders so Next.js / env bootstrap can run in CI (no real DB).
  DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: public-anon-key-placeholder-not-used-in-ci
  SUPABASE_SERVICE_ROLE_KEY: service-role-placeholder-not-used-in-ci-build

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verze pnpm jen z root package.json (`packageManager`); duplicitní `version` zde by padalo (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      # Lockfile lives at repo root — do not set job default cwd to apps/web or
      # setup-node cache may fail to resolve pnpm-lock.yaml (very fast CI failure).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: ESLint (apps/web)
        working-directory: apps/web
        run: pnpm lint

      - name: Compliance copy check (advisory)
        run: pnpm compliance:copy-check
        continue-on-error: true

      - name: Tenant-scope audit (blokující)
        run: pnpm audit:tenant

      - name: Unit tests
        working-directory: apps/web
        run: pnpm test

      - name: Build
        working-directory: apps/web
        run: pnpm build

      # Volitelně: v GitHub → Variables nastavte RUN_DOCUMENTS_SCHEMA_VERIFY=true a v job secrets
      # DATABASE_URL na read-only Postgres; pak sem přidejte krok `pnpm db:verify-documents-schema` (viz docs/OPS_RUNBOOK.md).

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install chromium --with-deps

      # Playwright uses `pnpm start` when CI=true (see apps/web/playwright.config.ts) — needs prior `pnpm build`.
      - name: E2E smoke
        working-directory: apps/web
        run: pnpm test:e2e
        env:
          CI: "true"
